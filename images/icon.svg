<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A535C"/>
      <stop offset="50%" style="stop-color:#4A3F6B"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>
  <!-- Window frame -->
  <rect x="24" y="30" width="80" height="68" rx="4" fill="#1a1a2e" stroke="#ffffff" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="24" y="30" width="80" height="14" rx="4" fill="#1A535C"/>
  <rect x="24" y="38" width="80" height="6" fill="#1A535C"/>
  <!-- Window buttons -->
  <circle cx="34" cy="37" r="3" fill="#ff5f57"/>
  <circle cx="44" cy="37" r="3" fill="#febc2e"/>
  <circle cx="54" cy="37" r="3" fill="#28c840"/>
  <!-- Activity bar -->
  <rect x="24" y="44" width="14" height="54" fill="#4A3F6B"/>
  <!-- Status bar -->
  <rect x="24" y="88" width="80" height="10" rx="0" fill="#2D5A27"/>
  <rect x="24" y="94" width="80" height="4" rx="4" fill="#2D5A27"/>
  <!-- Content area -->
  <rect x="38" y="44" width="66" height="44" fill="#252535"/>
  <!-- Code lines -->
  <rect x="42" y="50" width="30" height="3" rx="1" fill="#6B3A3A" opacity="0.8"/>
  <rect x="42" y="57" width="45" height="3" rx="1" fill="#4A3F6B" opacity="0.8"/>
  <rect x="42" y="64" width="25" height="3" rx="1" fill="#1A535C" opacity="0.8"/>
  <rect x="42" y="71" width="50" height="3" rx="1" fill="#1E3A5F" opacity="0.8"/>
  <rect x="42" y="78" width="35" height="3" rx="1" fill="#2D5A27" opacity="0.8"/>
</svg>
